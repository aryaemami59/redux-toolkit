# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: RTKQ OpenAPI Codegen
defaults:
  run:
    working-directory: ./packages/rtk-query-codegen-openapi

on: [push, pull_request]

jobs:
  changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      codegen: ${{ steps.filter.outputs.codegen }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            codegen:
              - 'packages/rtk-query-codegen-openapi/**'
              - 'yarn.lock'
              - '.github/workflows/test-codegen.yml'

  build:
    needs: [changes]
    if: ${{ needs.changes.outputs.codegen == 'true' }}

    defaults:
      run:
        working-directory: ./packages/rtk-query-codegen-openapi

    runs-on: ${{ matrix.os }}

    name: 'Build artifact: ${{ matrix.os }} + Node ${{ matrix.node-version }}'

    strategy:
      matrix:
        node-version: ['24.x']
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Pack
        run: yarn pack

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact-upload-step
        with:
          name: package
          path: ./packages/rtk-query-codegen-openapi/package.tgz

      - name: Did we fail?
        if: failure()
        run: ls -lR

  test:
    needs: build
    defaults:
      run:
        working-directory: ./packages/rtk-query-codegen-openapi
    name: 'Test build artifact: ${{ matrix.os }} + Node ${{ matrix.node-version }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Download artifact
        id: download-artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./packages/rtk-query-codegen-openapi
          name: package

      - name: Install dependencies
        run: yarn install

      - name: Install build artifact
        run: yarn add ./package.tgz

      - name: Remove path alias
        run: sed -i -e /@remap-prod-remove-line/d ./tsconfig.json

      - name: Run tests
        run: yarn test
        env:
          TEST_DIST: true

      - name: Did we fail?
        if: failure()
        run: ls -R

  are-the-types-wrong:
    name: Check package definition with are-the-types-wrong

    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Use node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install deps
        run: yarn install

      - name: Download artifact
        id: download-artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./packages/rtk-query-codegen-openapi
          name: package

      - name: Run are-the-types-wrong
        run: yarn attw ./package.tgz --format table --exclude-entrypoints cli
